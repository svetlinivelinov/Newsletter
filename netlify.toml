[build]
  functions = "netlify/functions"
  publish   = "."

[dev]
  framework  = "#static"
  targetPort = 3999
  port       = 8888

[functions]
  node_bundler = "esbuild"

# Phase 1 — Daily digest at 05:30 UTC (background function: up to 15 min)
[functions."send-newsletters-background"]
  schedule = "30 5 * * *"

# HTML pages — never cache at CDN or browser; always fetch fresh after deploy
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# Root path (serves index.html)
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma        = "no-cache"
    Expires       = "0"

# Security headers for functions
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Cache-Control          = "no-store"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "DENY"
    X-XSS-Protection       = "1; mode=block"
